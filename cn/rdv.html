<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>预约会议 – One Billion Forwarders</title>
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <div id="header-placeholder"></div>

  <!-- HEADER (inchangé) -->

  <main class="container">

    <section class="section">
      <div class="split" style="align-items:start; gap:32px;">

        <!-- 左侧文本 -->
        <div>
          <h1 class="h1" style="margin-top:0;">
            预约会议，帮助您更好地规划从中国的进口项目。
          </h1>
          <h2>为什么要预约会议？</h2>
          <p>
            一次简短的沟通可以帮助我们了解您的需求，识别关键问题，并为您提供最合适的解决方案。
          </p>

          <div class="list" style="margin-top:16px;">
            <div class="li">明确您的进口项目</div>
            <div class="li">识别风险与关键问题</div>
            <div class="li">制定合适的策略</div>
            <div class="li">节省时间并避免错误</div>
          </div>
        </div>

        <!-- 右侧日历 -->
        <div class="card pad neon-frame" style="min-height:600px; display:flex; align-items:center; justify-content:center; overflow:hidden; border-radius:16px;">
          <div class="calendly-inline-widget"
               data-url="https://calendly.com/ton-compte/rdv"
               style="min-width:320px;height:600px;width:100%; border-radius:16px; overflow:hidden;">
          </div>
        </div>

      </div>
    </section>

    <section class="section">
      <div class="card pad neon-frame" style="text-align:center;">
        <h2>您更希望通过表单提交需求吗？</h2>
        <p style="max-width:760px; margin:0 auto 18px;">
          如果您已经有较为详细的信息，也可以直接提交报价申请。
        </p>
        <div class="btns" style="justify-content:center;">
          <a class="btn" href="contact.html">获取报价</a>
        </div>
      </div>
    </section>

  </main>

  <!-- SCRIPT CALENDLY -->
  <script src="https://assets.calendly.com/assets/external/widget.js"></script>

  <!-- HEADER / FOOTER LOAD -->
  <script src="../assets/script.js"></script>

  <div id="footer-placeholder"></div>
</body>
</html>
