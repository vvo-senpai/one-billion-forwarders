<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact Freight Forwarder China | Transport Quote, Customs, FBA – One Billion Forwarders</title>
  <meta name="description" content="Request a quote from a freight forwarder based in Guangzhou, China: FCL/LCL sea freight, air freight, customs clearance, Amazon FBA logistics, warehousing & distribution, cargo insurance and supplier sourcing. Fast response." />
  <link rel="stylesheet" href="../assets/styles.css" />
  <link rel="canonical" href="contact.html" />
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "LogisticsBusiness",
      "name": "One Billion Forwarders",
      "description": "Freight forwarder based in Guangzhou specializing in sea freight (FCL/LCL), air freight, customs clearance, Amazon FBA and supplier sourcing.",
      "areaServed": "Worldwide",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Guangzhou",
        "addressCountry": "CN"
      }
    },
    {
      "@type": "ContactPage",
      "name": "Contact & quote request",
      "about": {
        "@type": "Organization",
        "name": "One Billion Forwarders"
      },
      "inLanguage": "en"
    }
  ]
}
</script>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="container">
    <section class="hero">
      <h1 class="h1" style="margin-bottom:10px;">Contact & quote request</h1>
      <p class="sub">Describe your needs (freight or sourcing). We will get back to you quickly with a suitable solution.</p>
    </section>

    <section class="section split">
      <div class="card pad">
        <h2>Form</h2>

        <form id="quoteForm" class="form" action="../form-handler.php" method="POST">
          <div class="field">
            <label>Name / Company</label>
            <input name="name" placeholder="Example: ABC Trading" required />
          </div>
          <div class="field">
            <label>Email *</label>
            <input name="email" type="email" placeholder="e.g. contact@..." required />
          </div>

          <div class="field">
            <label>WhatsApp (optional)</label>
            <input name="whatsapp" placeholder="+44 ..." />
          </div>
          <div class="field">
            <label>Service</label>
            <select name="service">
              <option>Freight</option>
              <option>Sourcing</option>
              <option>Freight + Sourcing</option>
            </select>
          </div>

          <div class="field">
            <label>Shipment type</label>
            <select name="shipment">
              <option>I don’t know yet</option>
              <option>Sea freight</option>
              <option>Air freight</option>
              <option>Land transport</option>
            </select>
          </div>
          <div class="field">
            <label>Mode (for sea freight)</label>
            <select name="mode">
              <option>Not applicable</option>
              <option>FCL (full container load)</option>
              <option>LCL (less than container load)</option>
            </select>
          </div>

          <div class="field full">
            <label>Message</label>
            <textarea name="message" required placeholder="Please include:
• Destination (city/country)
• Goods (type + quantity)
• Weight/volume (if known)
• Incoterm (if known)
• Desired timeline (if urgent)
• Other useful details (value, constraints, FBA, etc.)"></textarea>
          </div>

          <div class="full">
            <button class="btn primary" type="submit">Send request</button>
            <div class="note">Your request is sent directly through our system. We will get back to you quickly.</div>
          </div>
        </form>
      </div>

      <div class="card pad">
        <h2>Direct contact</h2>
        <p class="small" style="margin:10px 0 0;">
          Email: <a href="mailto:contact@obforwarders.com">contact@obforwarders.com</a><br/>
          Location: Guangzhou, China
        </p>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="../assets/script.js"></script>
</body>
</html>
