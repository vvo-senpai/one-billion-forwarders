<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>联系中国货运代理 | 获取报价 – One Billion Forwarders</title>
  <meta name="description" content="联系总部位于中国广州的国际货运代理。提供海运（FCL/LCL）、空运、清关、Amazon FBA物流、仓储配送、货运保险及产品采购服务。快速回复。" />
  <link rel="stylesheet" href="../assets/styles.css" />
  <link rel="canonical" href="contact.html" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "LogisticsBusiness",
        "name": "One Billion Forwarders",
        "description": "总部位于广州的中国货运代理，专注海运（FCL/LCL）、空运、清关、Amazon FBA物流与供应商采购服务。",
        "areaServed": "Worldwide",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Guangzhou",
          "addressCountry": "CN"
        }
      },
      {
        "@type": "ContactPage",
        "name": "联系与报价申请",
        "about": {
          "@type": "Organization",
          "name": "One Billion Forwarders"
        },
        "inLanguage": "zh"
      }
    ]
  }
  </script>
</head>
<body>
  <header>
    <div class="container nav">
      <a class="brand" href="index.html">
        <img src="../assets/images/logo.png" alt="One Billion Forwarders 中国货运代理" class="logo-img" />
        <img src="../assets/images/titre.png" alt="One Billion Forwarders" class="brand-title-img" />
      </a>
      <button class="menu-toggle" type="button" aria-label="打开菜单">☰</button>
      <nav class="navlinks">
        <a data-nav href="index.html">首页</a>
        <a data-nav href="services.html">服务</a>
        <a data-nav class="btn primary" href="contact.html">获取报价</a>
        <div class="lang-switch modern-lang">
          <div class="lang-pill">
            <a href="../contact.html" class="lang-btn">FR</a>
            <a href="../en/contact.html" class="lang-btn">EN</a>
            <a href="contact.html" class="lang-btn active">中</a>
          </div>
        </div>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1 class="h1" style="margin-bottom:10px;">联系与报价申请</h1>
      <p class="sub">请描述您的需求（运输或采购）。我们会尽快为您提供解决方案。</p>
    </section>

    <section class="section split">
      <div class="card pad">
        <h2>联系表单</h2>

        <!-- 请将 data-to 替换为您的企业邮箱 -->
        <form id="quoteForm" class="form" data-to="EMAIL_PRO@exemple.com">
          <div class="field">
            <label>姓名 / 公司</label>
            <input name="name" placeholder="例如：ABC Trading" />
          </div>
          <div class="field">
            <label>邮箱 *</label>
            <input name="email" type="email" placeholder="例如：contact@..." required />
          </div>

          <div class="field">
            <label>WhatsApp（可选）</label>
            <input name="whatsapp" placeholder="+33 ..." />
          </div>
          <div class="field">
            <label>服务类型</label>
            <select name="service">
              <option>运输</option>
              <option>采购</option>
              <option>运输 + 采购</option>
            </select>
          </div>

          <div class="field">
            <label>运输方式</label>
            <select name="shipment">
              <option>不确定</option>
              <option>海运</option>
              <option>空运</option>
              <option>陆运</option>
            </select>
          </div>
          <div class="field">
            <label>海运模式（如适用）</label>
            <select name="mode">
              <option>不适用</option>
              <option>FCL（整柜）</option>
              <option>LCL（拼箱）</option>
            </select>
          </div>

          <div class="field full">
            <label>留言</label>
            <textarea name="message" placeholder="请提供以下信息：
• 目的地（城市/国家）
• 货物类型与数量
• 重量/体积（如已知）
• 贸易条款（如已知）
• 期望发货时间（如紧急）
• 其他补充信息（货值、特殊要求、FBA等）"></textarea>
          </div>

          <div class="full">
            <button class="btn primary" type="submit">发送申请</button>
            <div class="note">按钮会打开您的邮箱并生成预填内容（无需服务器）。如需网站自动提交，我们可以连接表单服务。</div>
          </div>
        </form>
      </div>

      <div class="card pad">
        <h2>直接联系</h2>
        <p class="small" style="margin:10px 0 0;">
          Email: <a href="mailto:EMAIL_PRO@exemple.com">EMAIL_PRO@exemple.com</a><br/>
          地址：中国 广州
        </p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <strong>One Billion Forwarders</strong> — 货运与物流<br/>
      广州，中国 • Email: <a href="mailto:EMAIL_PRO@exemple.com">EMAIL_PRO@exemple.com</a>
    </div>
  </footer>

  <script src="../assets/script.js"></script>
</body>
</html>
